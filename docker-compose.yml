services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vpnbot
      POSTGRES_PASSWORD: vpnbot
      POSTGRES_DB: vpnbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpnbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
      DATABASE_URL: postgresql+asyncpg://vpnbot:vpnbot@db:5432/vpnbot
      SECRET_KEY: ${SECRET_KEY:-}
      PAYMENT_AMOUNT_RUB: ${PAYMENT_AMOUNT_RUB:-175}
      PAYMENT_PERIOD_DAYS: ${PAYMENT_PERIOD_DAYS:-30}
      TRIAL_PERIOD_DAYS: ${TRIAL_PERIOD_DAYS:-3}
      PAYMENT_DETAILS_TEXT: ${PAYMENT_DETAILS_TEXT:-}
      SUPPORT_CONTACT: ${SUPPORT_CONTACT:-@support}
      XUI_REQUEST_TIMEOUT: ${XUI_REQUEST_TIMEOUT:-15}
      SERVER_HEALTH_POLL_SECONDS: ${SERVER_HEALTH_POLL_SECONDS:-60}
      EXPIRY_NOTIFY_POLL_SECONDS: ${EXPIRY_NOTIFY_POLL_SECONDS:-300}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      XUI_DEBUG: ${XUI_DEBUG:-false}
      ANTI_SHARING_ENABLED: ${ANTI_SHARING_ENABLED:-true}
      DEVICE_POLICY: ${DEVICE_POLICY:-soft}
      DEFAULT_IP_LIMIT: ${DEFAULT_IP_LIMIT:-3}
      WARN_THRESHOLD_24H: ${WARN_THRESHOLD_24H:-5}
      CRITICAL_THRESHOLD_24H: ${CRITICAL_THRESHOLD_24H:-8}
      AUTO_BLOCK_ENABLED: ${AUTO_BLOCK_ENABLED:-false}
      TRACKING_WINDOW_HOURS: ${TRACKING_WINDOW_HOURS:-24}
      ANTI_SHARING_POLL_MINUTES: ${ANTI_SHARING_POLL_MINUTES:-5}

volumes:
  pgdata:
